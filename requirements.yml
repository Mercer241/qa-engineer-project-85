functional:
  - Пользователь может зарегистрироваться на платформе через аккаунт GitHub
  - Пользователь может создать игру против другого игрока, бота или друга
  - Пользователь может выбрать уровень сложности задачи (легкий, средний, сложный)
  - Пользователь может выбрать конкретную задачу или оставить случайный выбор
  - Пользователь может выбрать язык программирования для решения задачи
  - Пользователь может менять язык программирования в процессе решения
  - Оба игрока видят код друг друга в реальном времени
  - Игроки видят вывод тестов во время решения
  - Пользователь может просматривать запись завершенной игры
  - Пользователь может общаться в общем чате
  - Пользователь может видеть свой рейтинг и рейтинг других игроков
  - Пользователь может видеть рейтинг за неделю, месяц и все время
  - Интерфейс доступен на двух языках: русский и английский
  - Пользователь может следить за ходом игры других участников (зрительский режим)

non-functional:
  - Время отклика интерфейса при вводе кода и переключении языков не должно превышать 500 мс
  - Система должна выдерживать нагрузку до 1000 одновременных пользователей без деградации производительности
  - Сайт должен корректно отображаться и работать на мобильных устройствах (адаптивный дизайн)
  - Сайт должен быть протестирован на совместимость с последними тремя версиями браузеров (Chrome, Firefox, Safari, Edge)
  - Авторизация и передача данных должны быть защищены (HTTPS, OAuth 2.0)
  - Данные пользователей (пароли, токены) должны храниться в зашифрованном виде
  - Время загрузки страниц не должно превышать 3 секунды при скорости интернета 5 Мбит/с
  - Редактор кода должен работать с задержкой не более 100 мс при вводе текста

implicit:
  - Код решения должен выполняться на серверной стороне в изолированной среде (безопасность выполнения)
  - Время выполнения решения должно быть ограничено (таймаут), чтобы избежать зависаний
  - При дисконнекте игрока игра должна завершаться с соответствующим уведомлением
  - Игрок не может использовать внешние библиотеки, кроме разрешенных (lodash, rambda)
  - Задачи должны иметь четкое описание на двух языках для избежания недопонимания
  - В чате должна быть модерация или система фильтрации спама/оскорблений
  - Результаты игр должны сохраняться для последующего просмотра истории
  - Система рейтинга должна быть справедливой (учитывать сложность задачи и время решения)
