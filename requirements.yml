functional:
  - Регистрация пользователя через GitHub аккаунт
  - Создание игры против другого игрока
  - Создание игры против бота
  - Создание игры с другом по ссылке
  - Выбор уровня сложности задачи
  - Выбор конкретной задачи или случайный выбор
  - Выбор языка программирования для решения
  - Смена языка программирования в процессе решения
  - Отображение кода соперника в реальном времени
  - Отображение вывода тестов у обоих игроков
  - Просмотр записи завершенной игры
  - Общение в общем чате
  - Просмотр рейтинга за неделю, месяц и все время
  - Интерфейс на русском и английском языках
  - Наблюдение за ходом игры других участников

non-functional:
  - Время отклика интерфейса не более 500 мс
  - Нагрузка до 1000 одновременных пользователей
  - Адаптивный дизайн для мобильных устройств
  - Совместимость с последними версиями Chrome, Firefox, Safari, Edge
  - Защита данных через HTTPS и OAuth 2.0
  - Хранение паролей и токенов в зашифрованном виде
  - Время загрузки страниц не более 3 секунд
  - Задержка редактора кода не более 100 мс

implicit:
  - Изолированная среда выполнения кода
  - Ограничение времени выполнения решения
  - Завершение игры при дисконнекте игрока
  - Использование только разрешенных библиотек
  - Четкое описание задач на двух языках
  - Модерация или фильтрация чата
  - Сохранение результатов игр для истории
  - Справедливый расчет рейтинга
