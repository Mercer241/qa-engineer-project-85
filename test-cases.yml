- summary: |
    Успешная регистрация пользователя с почтой и паролем
  requirement: |
    Пользователь должен иметь возможность зарегистрироваться с использованием email и пароля
  prerequisites: |
    Открыта страница регистрации Codebattle
  test-data: |
    Email: testuser@example.com
    Пароль: TestPass123!
    Подтверждение пароля: TestPass123!
  steps:
    - Ввести email в поле "Email"
    - Ввести пароль в поле "Пароль"
    - Ввести подтверждение пароля
    - Нажать кнопку "Зарегистрироваться"
  expected-result: |
    Пользователь успешно зарегистрирован
    Выполнен автоматический вход
    Отображается имя пользователя в шапке сайта

- summary: |
    Ошибка регистрации при использовании уже существующего email
  requirement: |
    При попытке регистрации с уже существующим email система должна показывать сообщение об ошибке
  prerequisites: |
    Открыта страница регистрации Codebattle
    Email testuser@example.com уже зарегистрирован
  test-data: |
    Email: testuser@example.com
    Пароль: TestPass123!
    Подтверждение пароля: TestPass123!
  steps:
    - Ввести существующий email
    - Ввести пароль
    - Ввести подтверждение пароля
    - Нажать кнопку "Зарегистрироваться"
  expected-result: |
    Отображается сообщение об ошибке "Пользователь с таким email уже существует"
    Регистрация не выполнена

- summary: |
    Успешный вход пользователя с почтой и паролем
  requirement: |
    Зарегистрированный пользователь должен входить в систему с email и паролем
  prerequisites: |
    Открыта страница входа Codebattle
    Пользователь зарегистрирован
  test-data: |
    Email: testuser@example.com
    Пароль: TestPass123!
  steps:
    - Ввести email
    - Ввести пароль
    - Нажать кнопку "Войти"
  expected-result: |
    Выполнен вход в систему
    Отображается имя пользователя в шапке сайта

- summary: |
    Ошибка входа с неверным паролем
  requirement: |
    При вводе неверного пароля система должна показывать сообщение об ошибке
  prerequisites: |
    Открыта страница входа Codebattle
  test-data: |
    Email: testuser@example.com
    Пароль: WrongPassword123
  steps:
    - Ввести email
    - Ввести неверный пароль
    - Нажать кнопку "Войти"
  expected-result: |
    Отображается сообщение об ошибке "Неверный email или пароль"
    Вход не выполнен


    - summary: |
    Создание игры с другим игроком (PvP)
  requirement: |
    Пользователь может создать игру для двух игроков
  prerequisites: |
    Пользователь авторизован
    Открыта главная страница
  test-data: |
    Выбран режим "Против игрока"
  steps:
    - Нажать кнопку "Создать игру"
    - Выбрать режим "Против игрока"
    - Выбрать уровень сложности
    - Нажать кнопку "Начать игру"
  expected-result: |
    Создана игра
    Отображается код приглашения или ссылка для приглашения
    Игра ожидает второго игрока

- summary: |
    Присоединение к существующей игре по ссылке (друг)
  requirement: |
    Друг может присоединиться к игре по пригласительной ссылке
  prerequisites: |
    Создана игра с режимом "Против игрока"
    Получена пригласительная ссылка
  test-data: |
    Пригласительная ссылка из созданной игры
  steps:
    - Перейти по пригласительной ссылке в другом браузере или инкогнито-режиме
    - Авторизоваться под другим пользователем
    - Нажать кнопку "Присоединиться"
  expected-result: |
    Игра началась с двумя игроками
    Оба игрока видят редакторы кода

- summary: |
    Присоединение к игре через поиск (случайный игрок)
  requirement: |
    Случайный игрок может присоединиться к открытой игре
  prerequisites: |
    Создана открытая игра
    Второй пользователь авторизован
  test-data: |
    Открытая игра в списке доступных
  steps:
    - Второй пользователь переходит в раздел "Доступные игры"
    - Находит игру в списке
    - Нажимает кнопку "Присоединиться"
  expected-result: |
    Игра началась с двумя игроками
    Оба игрока видят редакторы кода


    - summary: |
    Завершение игры проигрышем игрока
  requirement: |
    При проигрыше игра должна завершаться и отображать победителя
  prerequisites: |
    Открыта страница активной игры
    Игра против бота или другого игрока
  test-data: |
    Неправильное решение задачи или истечение времени
  steps:
    - Дождаться, когда противник решит задачу быстрее
    - Или ввести неправильное решение и отправить на проверку
  expected-result: |
    Отображается сообщение о проигрыше
    Игра переходит в режим "завершена"
    Победитель указан

- summary: |
    Завершение игры по таймеру (время вышло)
  requirement: |
    При истечении времени игра должна завершаться
  prerequisites: |
    Открыта страница активной игры
    Установлен таймер на выполнение
  test-data: |
    Ожидание истечения времени
  steps:
    - Начать игру
    - Не вводить код и не отправлять решение
    - Дождаться истечения таймера
  expected-result: |
    Игра автоматически завершается по истечении времени
    Отображается сообщение "Время вышло"
    Победитель определяется по прогрессу

- summary: |
    Добровольная сдача игрока (кнопка "Сдаться")
  requirement: |
    Игрок может добровольно сдаться в любой момент игры
  prerequisites: |
    Открыта страница активной игры
  test-data: |
    Нажатие кнопки "Сдаться"
  steps:
    - В процессе игры нажать кнопку "Сдаться"
    - Подтвердить действие в диалоговом окне (если есть)
  expected-result: |
    Игра завершается
    Отображается сообщение о сдаче игрока
    Победа присуждается сопернику
