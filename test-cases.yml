- summary: |
    Проверка регистрации пользователя через GitHub аккаунт
  requirement: |
    Пользователь должен иметь возможность зарегистрироваться на платформе через аккаунт GitHub
  prerequisites: |
    Открыта главная страница Codebattle
  test-data: |
    Действующий аккаунт GitHub
  steps:
    - Нажать кнопку "Войти через GitHub"
    - Подтвердить авторизацию в окне GitHub
    - Дождаться перенаправления на главную страницу
  expected-result: |
    Пользователь успешно авторизован, отображается имя пользователя в шапке сайта

- summary: |
    Успешная регистрация пользователя с почтой и паролем
  requirement: |
    Пользователь должен иметь возможность зарегистрироваться с использованием email и пароля
  prerequisites: |
    Открыта страница регистрации Codebattle
  test-data: |
    Email: testuser@example.com
    Пароль: TestPass123!
    Подтверждение пароля: TestPass123!
  steps:
    - Ввести email в поле "Email"
    - Ввести пароль в поле "Пароль"
    - Ввести подтверждение пароля
    - Нажать кнопку "Зарегистрироваться"
  expected-result: |
    Пользователь успешно зарегистрирован
    Выполнен автоматический вход
    Отображается имя пользователя в шапке сайта

- summary: |
    Ошибка регистрации при использовании уже существующего email
  requirement: |
    При попытке регистрации с уже существующим email система должна показывать сообщение об ошибке
  prerequisites: |
    Открыта страница регистрации Codebattle
    Email testuser@example.com уже зарегистрирован
  test-data: |
    Email: testuser@example.com
    Пароль: TestPass123!
    Подтверждение пароля: TestPass123!
  steps:
    - Ввести существующий email
    - Ввести пароль
    - Ввести подтверждение пароля
    - Нажать кнопку "Зарегистрироваться"
  expected-result: |
    Отображается сообщение об ошибке "Пользователь с таким email уже существует"
    Регистрация не выполнена

- summary: |
    Успешный вход пользователя с почтой и паролем
  requirement: |
    Зарегистрированный пользователь должен входить в систему с email и паролем
  prerequisites: |
    Открыта страница входа Codebattle
    Пользователь зарегистрирован
  test-data: |
    Email: testuser@example.com
    Пароль: TestPass123!
  steps:
    - Ввести email
    - Ввести пароль
    - Нажать кнопку "Войти"
  expected-result: |
    Выполнен вход в систему
    Отображается имя пользователя в шапке сайта

- summary: |
    Ошибка входа с неверным паролем
  requirement: |
    При вводе неверного пароля система должна показывать сообщение об ошибке
  prerequisites: |
    Открыта страница входа Codebattle
  test-data: |
    Email: testuser@example.com
    Пароль: WrongPassword123
  steps:
    - Ввести email
    - Ввести неверный пароль
    - Нажать кнопку "Войти"
  expected-result: |
    Отображается сообщение об ошибке "Неверный email или пароль"
    Вход не выполнен

- summary: |
    Проверка создания игры против бота (случайная задача)
  requirement: |
    Пользователь может создать игру против бота со случайным выбором задачи
  prerequisites: |
    Пользователь авторизован на платформе
    Открыта главная страница
  test-data: |
    Выбран режим "Против бота"
    Выбран пункт "Случайная задача"
  steps:
    - Нажать кнопку "Создать игру"
    - Выбрать режим "Против бота"
    - Выбрать опцию "Случайная задача"
    - Нажать кнопку "Начать игру"
  expected-result: |
    Открывается страница игры с задачей и редактором кода

- summary: |
    Проверка создания игры против бота (конкретная задача "Площадь прямоугольника")
  requirement: |
    Пользователь может создать игру против бота с выбором конкретной задачи
  prerequisites: |
    Пользователь авторизован на платформе
    Открыта главная страница
  test-data: |
    Выбран режим "Против бота"
    Выбрана задача "Площадь прямоугольника"
  steps:
    - Нажать кнопку "Создать игру"
    - Выбрать режим "Против бота"
    - Выбрать задачу "Площадь прямоугольника"
    - Нажать кнопку "Начать игру"
  expected-result: |
    Открывается страница игры с задачей о площади прямоугольника

- summary: |
    Создание игры с другим игроком (PvP)
  requirement: |
    Пользователь может создать игру для двух игроков
  prerequisites: |
    Пользователь авторизован
    Открыта главная страница
  test-data: |
    Выбран режим "Против игрока"
  steps:
    - Нажать кнопку "Создать игру"
    - Выбрать режим "Против игрока"
    - Выбрать уровень сложности
    - Нажать кнопку "Начать игру"
  expected-result: |
    Создана игра
    Отображается код приглашения или ссылка для приглашения
    Игра ожидает второго игрока

- summary: |
    Присоединение к существующей игре по ссылке (друг)
  requirement: |
    Друг может присоединиться к игре по пригласительной ссылке
  prerequisites: |
    Создана игра с режимом "Против игрока"
    Получена пригласительная ссылка
  test-data: |
    Пригласительная ссылка из созданной игры
  steps:
    - Перейти по пригласительной ссылке в другом браузере или инкогнито-режиме
    - Авторизоваться под другим пользователем
    - Нажать кнопку "Присоединиться"
  expected-result: |
    Игра началась с двумя игроками
    Оба игрока видят редакторы кода

- summary: |
    Присоединение к игре через поиск (случайный игрок)
  requirement: |
    Случайный игрок может присоединиться к открытой игре
  prerequisites: |
    Создана открытая игра
    Второй пользователь авторизован
  test-data: |
    Открытая игра в списке доступных
  steps:
    - Второй пользователь переходит в раздел "Доступные игры"
    - Находит игру в списке
    - Нажимает кнопку "Присоединиться"
  expected-result: |
    Игра началась с двумя игроками
    Оба игрока видят редакторы кода

- summary: |
    Проверка смены языка программирования во время игры
  requirement: |
    Пользователь может менять язык программирования в процессе решения задачи
  prerequisites: |
    Открыта страница активной игры
    Задача загружена
  test-data: |
    Исходный язык: JavaScript
    Новый язык: Python
  steps:
    - В процессе решения задачи выбрать другой язык из выпадающего списка
    - Дождаться обновления редактора
  expected-result: |
    Редактор кода переключился на выбранный язык
    Шаблон решения обновился под новый язык

- summary: |
    Проверка ввода и выполнения корректного кода решения
  requirement: |
    При вводе корректного кода решение должно проходить тесты и завершать игру
  prerequisites: |
    Открыта страница активной игры
    Выбран язык JavaScript (NodeJS)
  test-data: |
    Код решения: const solution = (width, length) => { return width * length; };
  steps:
    - Ввести код решения в редактор
    - Нажать кнопку "Запустить тесты" или дождаться автоматического запуска
  expected-result: |
    Тесты проходят успешно
    Игра завершается победой
    Отображается результат игры

- summary: |
    Проверка отображения кода соперника в реальном времени
  requirement: |
    Оба игрока должны видеть код друг друга в реальном времени
  prerequisites: |
    Открыта страница активной игры
    Игра против другого игрока или бота
  test-data: |
    Активная игра
  steps:
    - Начать ввод кода в редакторе
    - Наблюдать за панелью соперника
  expected-result: |
    Код, вводимый игроком, отображается у соперника с минимальной задержкой

- summary: |
    Проверка завершения игры при победе (победа игрока)
  requirement: |
    При успешном решении задачи игра должна завершаться и отображать победителя
  prerequisites: |
    Открыта страница активной игры
    Код решения готов к запуску
  test-data: |
    Корректное решение задачи
  steps:
    - Ввести корректный код решения
    - Нажать кнопку "Запустить тесты"
    - Дождаться выполнения тестов
  expected-result: |
    Отображается сообщение о победе
    Игра переходит в режим "завершена"
    Доступен просмотр записи игры

- summary: |
    Завершение игры проигрышем игрока
  requirement: |
    При проигрыше игра должна завершаться и отображать победителя
  prerequisites: |
    Открыта страница активной игры
    Игра против бота или другого игрока
  test-data: |
    Неправильное решение задачи или истечение времени
  steps:
    - Дождаться, когда противник решит задачу быстрее
    - Или ввести неправильное решение и отправить на проверку
  expected-result: |
    Отображается сообщение о проигрыше
    Игра переходит в режим "завершена"
    Победитель указан

- summary: |
    Завершение игры по таймеру (время вышло)
  requirement: |
    При истечении времени игра должна завершаться
  prerequisites: |
    Открыта страница активной игры
    Установлен таймер на выполнение
  test-data: |
    Ожидание истечения времени
  steps:
    - Начать игру
    - Не вводить код и не отправлять решение
    - Дождаться истечения таймера
  expected-result: |
    Игра автоматически завершается по истечении времени
    Отображается сообщение "Время вышло"
    Победитель определяется по прогрессу

- summary: |
    Добровольная сдача игрока (кнопка "Сдаться")
  requirement: |
    Игрок может добровольно сдаться в любой момент игры
  prerequisites: |
    Открыта страница активной игры
  test-data: |
    Нажатие кнопки "Сдаться"
  steps:
    - В процессе игры нажать кнопку "Сдаться"
    - Подтвердить действие в диалоговом окне (если есть)
  expected-result: |
    Игра завершается
    Отображается сообщение о сдаче игрока
    Победа присуждается сопернику

- summary: |
    Проверка просмотра записи завершенной игры
  requirement: |
    Пользователь может просматривать запись завершенной игры в режиме проигрывателя
  prerequisites: |
    Есть завершенная игра
    Пользователь авторизован
  test-data: |
    ID завершенной игры
  steps:
    - Перейти в историю игр
    - Выбрать завершенную игру
    - Нажать кнопку "Просмотреть запись"
  expected-result: |
    Открывается страница с записью игры
    Редактор работает в режиме проигрывателя (только чтение)
    Доступны элементы управления воспроизведением

- summary: |
    Проверка смены языка интерфейса на русский
  requirement: |
    Интерфейс должен быть доступен на русском и английском языках
  prerequisites: |
    Открыта главная страница
  test-data: |
    Выбран язык: Русский
  steps:
    - Нажать на переключатель языка
    - Выбрать "Русский"
    - Обновить страницу (при необходимости)
  expected-result: |
    Все элементы интерфейса отображаются на русском языке

- summary: |
    Проверка отправки сообщения в общий чат
  requirement: |
    Зарегистрированные пользователи могут общаться в общем чате
  prerequisites: |
    Пользователь авторизован
    Открыта главная страница
    Чат доступен
  test-data: |
    Сообщение: "Привет, тестировщики!"
  steps:
    - Найти поле ввода чата
    - Ввести сообщение
    - Нажать кнопку "Отправить" или клавишу Enter
  expected-result: |
    Сообщение отображается в общем чате
    Отображается имя пользователя и время отправки

- summary: |
    Проверка отображения рейтинга за текущую неделю
  requirement: |
    Пользователи должны видеть рейтинг игроков за неделю
  prerequisites: |
    Пользователь авторизован
    Открыта страница рейтинга
  test-data: |
    Нет
  steps:
    - Перейти на страницу рейтинга
    - Выбрать период "Неделя"
  expected-result: |
    Отображается таблица рейтинга за неделю
    Указаны имена игроков и их очки
    Текущий пользователь выделен в списке

- summary: |
    Проверка адаптивности на мобильном устройстве
  requirement: |
    Сайт должен корректно отображаться на мобильных устройствах
  prerequisites: |
    Открыт сайт на мобильном устройстве или в режиме эмуляции мобильного устройства в DevTools
  test-data: |
    Разрешение экрана: 375x812 (iPhone)
  steps:
    - Открыть главную страницу
    - Открыть игру
    - Проверить отображение главной страницы (шапка, меню, кнопки)
    - Проверить отображение редактора кода в игре
    - Проверить доступность кнопок для нажатия пальцем
    - Проверить читаемость текста без масштабирования
    - Проверить, что нет горизонтальной прокрутки
    - Проверить отображение чата на мобильном экране
  expected-result: |
    Все элементы отображаются без наложений
    Редактор кода адаптирован под размер экрана
    Кнопки доступны для нажатия пальцем
    Текст читаемый

- summary: |
    Проверка нагрузки при 1000 одновременных пользователей
  requirement: |
    Сайт должен выдерживать нагрузку до 1000 одновременных пользователей
  prerequisites: |
    Настроено нагрузочное тестирование (например, JMeter)
    Тестовые данные для создания игр
  test-data: |
    1000 виртуальных пользователей
  steps:
    - Запустить нагрузочный тест с 1000 одновременных пользователей
    - Мониторить время отклика и ошибки
    - Измерять производительность в пиковой нагрузке
  expected-result: |
    Время отклика не превышает 3 секунд
    Процент ошибок менее 1%
    Сервер не падает
